# ┌──────────────────────────────────────────────────────────────────────────┐
# │ Production ArgoCD — HA, anti-affinity, PDB, resource limits              │
# └──────────────────────────────────────────────────────────────────────────┘

global:
    podAntiAffinity: hard

# ┌──────────────────────────────────────────────────────────────────────────┐
# │ Application Controller                                                   │
# └──────────────────────────────────────────────────────────────────────────┘
controller:
  replicas: 2
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      memory: "1Gi"
  pdb:
    enabled: true
    minAvailable: 1

# ┌──────────────────────────────────────────────────────────────────────────┐
# │ ConfigMap                                                                │
# └──────────────────────────────────────────────────────────────────────────┘
configs:
  params:
    server.insecure: true
  cm:
    create: true
    exec.enabled: true
    helm.timeout: 300

# ┌──────────────────────────────────────────────────────────────────────────┐
# │ API Server                                                               │
# └──────────────────────────────────────────────────────────────────────────┘
server:
  replicas: 2
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      memory: "512Mi"
  pdb:
    enabled: true
    minAvailable: 1
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 70
  ingressGrpc:
    enabled: false
  ingress:
    enabled: false
  service:
    labels:
      app: argocd-server
    type: NodePort

# ┌──────────────────────────────────────────────────────────────────────────┐
# │ Repo Server                                                              │
# └──────────────────────────────────────────────────────────────────────────┘
repoServer:
  replicas: 2
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      memory: "2Gi"
  pdb:
    enabled: true
    minAvailable: 1
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 70

# ┌──────────────────────────────────────────────────────────────────────────┐
# │ ApplicationSet Controller                                                │
# └──────────────────────────────────────────────────────────────────────────┘
applicationSet:
  replicas: 2
  pdb:
    enabled: true
    minAvailable: 1
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      memory: "512Mi"

# ┌──────────────────────────────────────────────────────────────────────────┐
# │ Redis                                                                    │
# └──────────────────────────────────────────────────────────────────────────┘
redis:
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      memory: "512Mi"
  pdb:
    enabled: true
    minAvailable: 1

# ┌──────────────────────────────────────────────────────────────────────────┐
# │ Dex Server                                                               │
# └──────────────────────────────────────────────────────────────────────────┘
dex:
  pdb:
    enabled: true
    minAvailable: 1
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      memory: "256Mi"

# ┌──────────────────────────────────────────────────────────────────────────┐
# │ Notifications Controller                                                 │
# └──────────────────────────────────────────────────────────────────────────┘
notifications:
  pdb:
    enabled: true
    minAvailable: 1
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      memory: "256Mi"
