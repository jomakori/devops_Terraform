apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apps
  namespace: argocd
spec:
  project: default
  labels: app.kubernetes.io/managed-by=Helm
  source:
    repoURL: ${gitops_repo}
    path: ${gitops_apps_path}
    targetRevision: ${gitops_branch}
    helm:
      valueFiles:
        - values.yaml
      parameters:
        - name: repoUrl
          value: ${gitops_repo}
        - name: path
          value: ${gitops_apps_path}
        - name: targetRevision
          value: ${gitops_branch}

  destination:
    server: "https://kubernetes.default.svc"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - Validate=false
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
