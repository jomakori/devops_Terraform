name: Terraform Plan

on:
  workflow_dispatch:  # manual run fallback
    inputs:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read
  pull-requests: write

jobs:
  detect-changes:
    name: Detect Terraform Changes
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
      destroy: ${{ steps.destroy.outputs.destroy }}
    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          fetch-depth: 0

      - name: Check - Detect Workspace Changes
        id: detect
        run:  |
          # check - Only allow changes on a single workspace
          workspaces=$(git diff --name-only origin/main HEAD | awk -F/ '!/^\.|^\// && /\// {print $1}' | sort | uniq)
          count=$(echo "$workspaces" | wc -l)

          if [ -z "$workspaces" ]; then
            echo "No Terraform changes detected - Skipping workflow..."
          elif [ $count -eq 1 ]; then
            echo "Detected Terraform Workspace changes on: $workspaces"
          else
            echo "Error: Too many workspaces detected: $count"
            echo "You can only make changes on 1 workspace per PR"
            echo "Terraform Workspaces detected: $workspaces"
            exit 1
          fi

          # Pass workspace name to outputs
          echo "changed=$workspaces" >> $GITHUB_OUTPUT

      - name: Check - Terraform Plan - Apply or Destroy
        if: steps.detect.outputs.changed != '' # if null - skip
        id: destroy
        run: |
          # Grab changed workspace
          dir_string=${{ steps.detect.outputs.changed }}

          # Trigger Apply or Destroy Plan
          if [ -d $dir_string ]; then
            echo "Trigger Terraform Apply Plan on: $dir_string"
            echo "destroy=false" >> $GITHUB_OUTPUT
          else
            echo "Trigger Terraform Destroy Plan on: $dir_string"
            echo "destroy=true" >> $GITHUB_OUTPUT
          fi

  terraform-plan:
    # Conditional - Ensures outputs are set in previous workflow
    if: needs.detect-changes.outputs.changed != '' && needs.detect-changes.outputs.destroy != ''

    runs-on: ubuntu-latest
    name: Planned Changes
    needs: detect-changes
    env:
      WORKSPACE: ${{ needs.detect-changes.outputs.changed }}
      DESTROY: ${{ needs.detect-changes.outputs.destroy }}
    steps:

      - name: Checkout
        uses: actions/checkout@main
        with:
          # Conditional, based on type of plan (since destroy plan needs the deleted workspace contents)
          ref: ${{ (env.DESTROY == 'true' && 'main') || github.head_ref }}

      - name: Install Doppler cli
        uses: dopplerhq/cli-action@master

      - name: Doppler - Fetch Secrets
        id: doppler
        uses: dopplerhq/secrets-fetch-action@main
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          inject-env-vars: true

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Install Atmos
        uses: cloudposse/github-action-setup-atmos@v3
        with:
          atmos-version: latest

      - name: Atmos - Setup config
        id: atmos-config
        run: |
          bash .github/scripts/generate-atmos-config.sh "${{ env.WORKSPACE }}"
          STACK_NAME=$(echo "${{ env.WORKSPACE }}" | tr '/' '-')
          echo "stack_name=${STACK_NAME}" >> $GITHUB_OUTPUT

      - name: Debug - Terraform Root/Backend Context
        run: |
          set +e
          STACK_NAME="${{ steps.atmos-config.outputs.stack_name }}"
          COMPONENT_DIR="stacks/${STACK_NAME}"
          echo "[debug] workspace=${{ env.WORKSPACE }}"
          echo "[debug] stack_name=${STACK_NAME}"
          echo "[debug] component_dir=${COMPONENT_DIR}"
          echo "[debug] pwd=$(pwd)"
          echo "[debug] tree under component_dir"
          find "${COMPONENT_DIR}" -maxdepth 2 -type f | sort
          echo "[debug] root versions.tf (wrapper)"
          sed -n '1,200p' "${COMPONENT_DIR}/versions.tf"
          echo "[debug] child copied versions.tf (sanitized module source)"
          sed -n '1,220p' "${COMPONENT_DIR}/_workspace_src/versions.tf" || true
          echo "[debug] stack yaml"
          sed -n '1,220p' "stacks/${STACK_NAME}.yaml"

          echo "[debug] atmos describe component (yaml)"
          atmos describe component "${STACK_NAME}" -s "${STACK_NAME}" 2>&1 || true

          echo "[debug] terraform init from wrapper root"
          terraform -chdir="${COMPONENT_DIR}" init -no-color 2>&1 | tee /tmp/tf-init.log
          INIT_RC=${PIPESTATUS[0]}
          echo "[debug] terraform init exit_code=${INIT_RC}"

          echo "[debug] terraform workspace show/list/select-or-create"
          terraform -chdir="${COMPONENT_DIR}" workspace show -no-color 2>&1 || true
          terraform -chdir="${COMPONENT_DIR}" workspace list -no-color 2>&1 || true
          terraform -chdir="${COMPONENT_DIR}" workspace select -or-create "${STACK_NAME}" -no-color 2>&1 || true

      - name: Terraform - Validate
        run: |
          atmos terraform init ${{ steps.atmos-config.outputs.stack_name }} -s ${{ steps.atmos-config.outputs.stack_name }}
          atmos terraform validate ${{ steps.atmos-config.outputs.stack_name }} -s ${{ steps.atmos-config.outputs.stack_name }}

      - name: Terraform Plan - ${{ env.WORKSPACE }}
        id: terraform-plan
        run: |
          atmos terraform plan ${{ steps.atmos-config.outputs.stack_name }} -s ${{ steps.atmos-config.outputs.stack_name }} --ci

      - name: Cache Terraform Plan
        uses: actions/cache@v4
        with:
          path: |
            stacks/.terraform
            stacks/**/.terraform
          key: ${{ env.WORKSPACE }}-${{ github.sha }}-plan
        env:
          CACHE_SKIP: ${{ env.FORCE_REGEN == 'true' }}
